name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build all platforms
        run: bash scripts/build-all.sh

      - name: Generate manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun run scripts/generate-manifest.ts "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/balatro-saves-sync-darwin-arm64
            dist/balatro-saves-sync-darwin-x64
            dist/balatro-saves-sync-linux-arm64
            dist/balatro-saves-sync-linux-x64
            dist/balatro-saves-sync-win32-x64.exe
            dist/manifest.json
